name: CI — Test & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  IMAGE_NAME: cicd-pipeline-project

jobs:
  # ──────────────────────────────────────────
  # Job 1: Test & Build Next.js app
  # ──────────────────────────────────────────
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Lint code
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            .next/
            public/
          retention-days: 3

  # ──────────────────────────────────────────
  # Job 2: Docker build & verify
  # ──────────────────────────────────────────
  docker-build:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.prod
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ $SIZE_MB -gt 500 ]; then
            echo "WARNING: Image is larger than 500MB (${SIZE_MB}MB)"
          else
            echo "Image size OK: ${SIZE_MB}MB"
          fi

      - name: Run container smoke test
        run: |
          docker run -d \
            --name smoke-test \
            -p 3000:3000 \
            -e NODE_ENV=production \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          
          echo "Waiting for container to start..."
          sleep 15
          
          docker ps | grep smoke-test || (echo "Container not running!" && exit 1)
          
          echo "Container is running successfully"
          docker stop smoke-test
          docker rm smoke-test

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: /tmp/image.tar
          retention-days: 1
