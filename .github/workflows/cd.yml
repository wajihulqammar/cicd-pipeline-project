name: CD — Deploy to Railway

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────
  # Job: Deploy to Railway
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Record deploy start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Verify Railway CLI installation
        run: railway --version

      - name: Deploy to Railway
        id: deploy
        run: |
          railway up --detach --service web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment to be live
        run: |
          echo "Waiting 30 seconds for Railway deployment to propagate..."
          sleep 30

      - name: Health check — verify live URL
        id: healthcheck
        run: |
          URL="${{ secrets.RAILWAY_SERVICE_URL }}"
          echo "Checking: $URL"

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 15 || echo "000")
            echo "Attempt $i — HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "health_ok=true" >> $GITHUB_OUTPUT
              echo "live_url=$URL" >> $GITHUB_OUTPUT
              echo "Deployment live at $URL"
              exit 0
            fi

            if [ $i -lt 5 ]; then
              sleep 15
            fi
          done

          echo "health_ok=false" >> $GITHUB_OUTPUT
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Calculate deploy duration
        if: always()
        id: duration
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          DURATION=$((END - START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))
          echo "formatted=${MINS}m ${SECS}s" >> $GITHUB_OUTPUT

      # ── SUCCESS NOTIFICATION ─────────────────
      - name: Slack — Deploy Success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Deployment Successful",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Project:*\ncicd-pipeline-project"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.event.head_commit.message }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.head_commit.author.name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Duration:*\n${{ steps.duration.outputs.formatted }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit SHA:*\n`${{ github.sha }}`"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Live URL:* <${{ secrets.RAILWAY_SERVICE_URL }}|${{ secrets.RAILWAY_SERVICE_URL }}>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "View run: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions #${{ github.run_number }}>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # ── FAILURE NOTIFICATION ─────────────────
      - name: Slack — Deploy Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Deployment Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Project:*\ncicd-pipeline-project"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.event.head_commit.message }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.head_commit.author.name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔍 View Logs:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here to debug>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
